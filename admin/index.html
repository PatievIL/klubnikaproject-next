<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Переход в кабинет — Klubnika Project</title>
  <meta http-equiv="refresh" content="0; url=../cabinet/?section=dashboard" />
  <link rel="stylesheet" href="../styles.css?v=20260405h" />
  <!-- SEO:START -->
  <meta name="robots" content="noindex, nofollow" />
  <!-- SEO:END -->
</head>
<body>
  <main class="section">
    <div class="container">
      <div class="section-frame">
        <div class="card card-pad">
          <div class="tag">Migration</div>
          <h1 class="calc-card-title">Старый `/admin/` больше не используется</h1>
          <p class="sublead">Рабочий admin-контур переведён в единый кабинет. Перенаправляем в новый shell.</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="../cabinet/?section=dashboard">Открыть кабинет</a>
            <a class="btn btn-secondary" href="../cabinet/?section=catalog">Открыть каталог в кабинете</a>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
    const target = new URL("../cabinet/?section=dashboard", window.location.href);
    const params = new URLSearchParams(window.location.search);
    if (params.get("product")) target.searchParams.set("product", params.get("product"));
    window.location.replace(target.toString());
  </script>
</body>
</html>
