  <meta charset="UTF-8" />

    name="description"

  />
  <link rel="stylesheet" href="../../styles.css?v=20260404r" />

<body data-cabinet-view="login">
  <header class="hero">
    <div class="container">
      <div class="hero-shell">
        <div class="topbar">
          <a class="brand-home" href="../../">
            <img class="brand-lockup brand-lockup-primary" src="../../documents/logo/header-lockup-v1-close-compact-dark.svg?v=20260403aa" alt="KLUBNIKA PROJECT" />
            <img class="brand-lockup brand-lockup-compact" src="../../documents/logo/header-lockup-v1-close-compact-dark.svg?v=20260403aa" alt="KLUBNIKA PROJECT" />
          </a>

          <button class="nav-toggle" type="button" aria-label="Открыть меню" aria-expanded="false">
            <span></span>
          </button>

          <nav class="nav">
            <a href="../../">Сайт</a>
            <a href="../../catalog/">Каталог</a>
            <a href="../../calc/">Калькулятор</a>
            <a href="../">Кабинет</a>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="section cabinet-login-section">
      <div class="container">
        <div class="section-frame cabinet-frame cabinet-frame--login">
          <div class="account-shell cabinet-login-shell">
            <article class="card card-pad account-panel cabinet-login-panel">
              <div class="tag">Доступ</div>
              <h1 class="calc-card-title">Войти в кабинет</h1>
              <p class="sublead">Один вход для клиента, студента и команды. После авторизации откроется только ваш рабочий кабинет.</p>
              <form class="account-form" id="cabinet-login-form">
                <label class="account-label">
                  <span>Логин или email</span>
                  <input class="account-input" id="cabinet-login-identity" type="text" autocomplete="username" placeholder="Например, ваш email" />
                </label>
                <label class="account-label">
                  <span>Пароль</span>
                  <input class="account-input" id="cabinet-login-password" type="password" autocomplete="current-password" placeholder="Введите пароль" />
                </label>
                <div class="account-actions">
                  <button class="btn btn-primary" type="submit">Открыть кабинет</button>
                  <a class="btn btn-secondary" href="../../">Вернуться на сайт</a>
                </div>
              </form>
              <div class="account-status" id="cabinet-login-status"></div>
            </article>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer-main">
    <div class="container">
      <div class="footer-shell">
        <div class="footer-meta">

          </div>
        </div>
        <div class="footer-contacts">
          <a href="tel:+79255831669">+7 925 583-16-69</a>
